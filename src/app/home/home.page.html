<ion-content [fullscreen]="true">

    <!-- MENU HAMBURGUINHO -->
    <ion-menu contentId="main-content">
        <ion-header>
            <ion-toolbar>
                <ion-title>Configurar Perfil</ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
            <ion-row>
                <ion-col size="3">
                    <ion-avatar>
                        <img src="https://cinemacao.com/wp-content/uploads/2016/12/bob-esponja-3.jpg">
                    </ion-avatar>
                </ion-col>
                <ion-col size="9">
                    <ion-item>
                        <ion-label>
                            Bob Esponja
                        </ion-label>
                    </ion-item>
                    <ion-item>
                        <ion-label>
                            bob@espoja.com.br
                        </ion-label>
                    </ion-item>
                    <ion-item>
                        <ion-label>
                            @esponjinha
                        </ion-label>
                    </ion-item>
                </ion-col>
            </ion-row>
            <ion-row>
                <ion-col size="12">
                    <ion-item>
                        <ion-icon name="lock-open-outline" slot="stard"></ion-icon>
                        <icon-label>Alterar senha</icon-label>
                    </ion-item>
                    <ion-item>
                        <ion-icon name="color-palette-outline" slot="stard"></ion-icon>
                        <ion-label>Alterar Tema</ion-label>
                    </ion-item>
                    <ion-item lines="none">
                        <ion-icon name="arrow-undo-outline" slot="stard"></ion-icon>
                        <ion-label>Desconectar</ion-label>
                    </ion-item>
                </ion-col>
            </ion-row>
        </ion-content>
    </ion-menu>
    <div class="ion-page" id="main-content">
        <ion-header>
            <ion-toolbar>
                <ion-buttons slot="start">
                    <ion-menu-button></ion-menu-button>
                </ion-buttons>
                <ion-title>Pagina inicial </ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding">
            <ion-row>
                <ion-col size="12">
                    <ion-datetime></ion-datetime>
                </ion-col>
            </ion-row>
        </ion-content>
    </div>


</ion-content>
