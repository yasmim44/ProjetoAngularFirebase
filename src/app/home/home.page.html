<ion-content [fullscreen]="true">

    <ng-container *ngFor="let livro of this.livros">
        <h1>{{ livro.titulo }}</h1>
        <p>{{ livro.sinopse }}</p>
        <ng-container *ngFor="let categoria of this.livro.categoria"
          <marquee>{{categoria.nome}}</marquee>
        </ng-container>

    </ng-container>
    
    
</ion-content>
